<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <style>
        :root {
            --primary-book: #d4af37; /* Gold */
            --dark-paper: #2c2c2c;
            --light-paper: #f4f1ea;
            --accent-red: #8b0000;
            --shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', serif; }

        body {
            background-color: var(--light-paper);
            color: var(--dark-paper);
            line-height: 1.6;
        }

        /* Navigation & Header */
        header {
            background: var(--dark-paper);
            color: var(--primary-book);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--primary-book);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 1.8rem; font-weight: bold; letter-spacing: 2px; }

        .role-switcher {
            background: var(--primary-book);
            color: var(--dark-paper);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        /* Main Layout */
        .container { width: 90%; max-width: 1200px; margin: 2rem auto; }

        /* Admin Form Section */
        #admin-panel {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            border-left: 10px solid var(--primary-book);
            display: none; /* Controlled by JS */
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        input, select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-add { background: var(--primary-book); color: white; }
        .btn-delete { background: var(--accent-red); color: white; padding: 5px 10px; font-size: 0.8rem; }

        /* Book Grid Display */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        /* Creative Book Design */
        .book-card {
            background: white;
            padding: 20px;
            border-radius: 5px 15px 15px 5px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            border-left: 12px solid var(--dark-paper);
            transition: transform 0.3s;
        }

        .book-card:hover { transform: translateY(-5px); }

        .book-card::before {
            content: '';
            position: absolute;
            left: 5px; top: 0; bottom: 0; width: 2px;
            background: rgba(255,255,255,0.3);
        }

        .book-title { font-size: 1.25rem; font-weight: bold; color: var(--accent-red); margin-bottom: 5px; }
        .book-author { font-style: italic; color: #666; font-size: 0.9rem; }
        .book-meta { margin-top: auto; padding-top: 15px; border-top: 1px dashed #ddd; font-size: 0.85rem; }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-top: 5px;
        }
        .status-available { background: #e3f9e5; color: #1f7a33; }
        .status-borrowed { background: #fee2e2; color: #b91c1c; }

        .admin-actions { margin-top: 10px; display: flex; gap: 5px; }

        @media (max-width: 600px) {
            header { flex-direction: column; gap: 10px; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Library</div>
    <div>
        <span id="current-role-text" style="margin-right: 10px;">View: <strong>User</strong></span>
        <button class="role-switcher" onclick="toggleRole()">Switch to Admin</button>
    </div>
</header>

<div class="container">
    <section id="admin-panel">
        <h3>Add New Masterpiece</h3>
        <div class="form-grid">
            <input type="text" id="title" placeholder="Book Title">
            <input type="text" id="author" placeholder="Author Name">
            <select id="category">
                <option value="Fiction">Fiction</option>
                <option value="Non-Fiction">Non-Fiction</option>
                <option value="Science">Science</option>
                <option value="History">History</option>
            </select>
            <button class="btn btn-add" onclick="addBook()">Add to Library</button>
        </div>
    </section>

    <h2 style="margin-bottom: 1.5rem; border-bottom: 2px solid var(--primary-book); display: inline-block;">Library Collection</h2>
    <div id="book-grid" class="book-grid">
        </div>
</div>

<script>
    // Initial Data
    let books = JSON.parse(localStorage.getItem('libraryBooks')) || [
        { id: 1, title: "The Great Gatsby", author: "F. Scott Fitzgerald", category: "Fiction", status: "Available" },
        { id: 2, title: "A Brief History of Time", author: "Stephen Hawking", category: "Science", status: "Borrowed" }
    ];

    let isAdmin = false;

    // Toggle Admin/User View
    function toggleRole() {
        isAdmin = !isAdmin;
        document.getElementById('admin-panel').style.display = isAdmin ? 'block' : 'none';
        document.querySelector('.role-switcher').innerText = isAdmin ? 'Switch to User' : 'Switch to Admin';
        document.getElementById('current-role-text').innerHTML = `View: <strong>${isAdmin ? 'Admin' : 'User'}</strong>`;
        renderBooks();
    }

    // Add Book
    function addBook() {
        const title = document.getElementById('title').value;
        const author = document.getElementById('author').value;
        const category = document.getElementById('category').value;

        if (!title || !author) {
            alert("Please fill all fields");
            return;
        }

        const newBook = {
            id: Date.now(),
            title: title,
            author: author,
            category: category,
            status: "Available"
        };

        books.push(newBook);
        saveAndRender();
        
        // Clear inputs
        document.getElementById('title').value = '';
        document.getElementById('author').value = '';
    }

    // Delete Book
    function deleteBook(id) {
        books = books.filter(book => book.id !== id);
        saveAndRender();
    }

    // Toggle Availability (Edit feature)
    function toggleStatus(id) {
        if(!isAdmin) return;
        books = books.map(book => {
            if(book.id === id) {
                book.status = book.status === "Available" ? "Borrowed" : "Available";
            }
            return book;
        });
        saveAndRender();
    }

    // Save to LocalStorage
    function saveAndRender() {
        localStorage.setItem('libraryBooks', JSON.stringify(books));
        renderBooks();
    }

    // Render Books to UI
    function renderBooks() {
        const grid = document.getElementById('book-grid');
        grid.innerHTML = '';

        books.forEach(book => {
            const statusClass = book.status === "Available" ? "status-available" : "status-borrowed";
            
            const card = document.createElement('div');
            card.className = 'book-card';
            card.innerHTML = `
                <div class="book-title">${book.title}</div>
                <div class="book-author">by ${book.author}</div>
                <div class="book-meta">
                    <div>Genre: ${book.category}</div>
                    <span class="badge ${statusClass}">${book.status}</span>
                </div>
                ${isAdmin ? `
                    <div class="admin-actions">
                        <button class="btn btn-delete" onclick="deleteBook(${book.id})">Delete</button>
                        <button class="btn" style="background:#ddd; font-size:0.8rem;" onclick="toggleStatus(${book.id})">Toggle Status</button>
                    </div>
                ` : ''}
            `;
            grid.appendChild(card);
        });
    }

    // Initial Load
    renderBooks();
</script>

</body>
</html>
